name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Lint + testy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Testy
        run: pytest -v

  docker:
    name: Build obazu Dockera i test detekcji ruchu
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Build obrazu
        run: docker build -t app:ci .
      - name: Test detekcji na sample.mp4
        run: |
          docker run --rm -e API_URL=http://127.0.0.1:9/x app:ci | tee run.log
          grep -q "Wykryto ruch -> Start analizy" run.log
          echo "OK: kontener wykrył ruch na wbudowanym sample.mp4"
